services:
  postgres:
    image: postgres:16-alpine
    container_name: live-negotiation-ai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: live_negotiation_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - live_negotiation_ai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d live_negotiation_ai"]
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7-alpine
    container_name: live-negotiation-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - live_negotiation_ai_redisdata:/data

volumes:
  live_negotiation_ai_pgdata:
  live_negotiation_ai_redisdata:
